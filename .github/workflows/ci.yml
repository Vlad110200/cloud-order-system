name: Microservices CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Order Service
        working-directory: ./order-service/order-service
        run: mvn clean package -DskipTests

      - name: Build Inventory Service
        working-directory: ./inventory-service/inventory-service
        run: mvn clean package -DskipTests